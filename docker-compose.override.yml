services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
        - ./app:/app
    command: make dev
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development

  caddy:
    image: caddy:latest
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app